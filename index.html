      /* ================= Input ================= */
      let mouseDown = false;
      function toLocal(e) {
        const r = canvas.getBoundingClientRect();
        return { x: e.clientX - r.left, y: e.clientY - r.top };
      }
      canvas.addEventListener("pointerdown", (e) => {
        AudioBus.unlock();
        const { x, y } = toLocal(e);
        // restrict joystick to left half to avoid accidental grabs
        const inJoy = x <= canvas.clientWidth * 0.5 && Math.hypot(x - joystick.cx, y - joystick.cy) <= joystick.baseR;
        const inShoot = Math.hypot(x - shootBtn.cx, y - shootBtn.cy) <= shootBtn.r;

        if (
          (state === "playing" || state === "pausedBetween") &&
          Math.hypot(x - pauseBtn.x, y - pauseBtn.y) <= pauseBtn.r
        ) {
          pauseUI.open = true;
          pauseUI.confirm = false;
          AudioBus.SFX.button();
          return;
        }

        if (inJoy && joystick.pointerId === null) {
          joystick.active = true;
          joystick.pointerId = e.pointerId;
          joystick.stickX = x - joystick.cx;
          joystick.stickY = y - joystick.cy;
        } else if (inShoot && shootBtn.pointerId === null) {
          shootBtn.pressed = true;
          shootBtn.pointerId = e.pointerId;
        }

        if (e.pointerType === "mouse") {
          mouseDown = true;
        }
      });

      canvas.addEventListener("pointermove", (e) => {
        const { x, y } = toLocal(e);
        if (joystick.active && e.pointerId === joystick.pointerId) {
          const dx = x - joystick.cx,
            dy = y - joystick.cy,
            mag = Math.min(Math.hypot(dx, dy), joystick.baseR),
            ang = Math.atan2(dy, dx);
          joystick.stickX = Math.cos(ang) * mag;
          joystick.stickY = Math.sin(ang) * mag;
        }
      });

      function releasePointer(e) {
        if (e.pointerId === joystick.pointerId) {
          joystick.active = false;
          joystick.pointerId = null;
          joystick.stickX = 0;
          joystick.stickY = 0;
        }
        if (e.pointerId === shootBtn.pointerId) {
          shootBtn.pressed = false;
          shootBtn.pointerId = null;
        }
        if (e.pointerType === "mouse") {
          mouseDown = false;
        }
      }
      canvas.addEventListener("pointerup", releasePointer);
      canvas.addEventListener("pointercancel", releasePointer);

      const keys = { W: false, A: false, S: false, D: false, Space: false };
      addEventListener("keydown", (e) => {
        AudioBus.unlock();
        if (e.code === "KeyW") keys.W = true;
        if (e.code === "KeyA") keys.A = true;
        if (e.code === "KeyS") keys.S = true;
        if (e.code === "KeyD") keys.D = true;
        if (e.code === "Space") {
          e.preventDefault();
          keys.Space = true;
        }
      });
      addEventListener("keyup", (e) => {
        if (e.code === "KeyW") keys.W = false;
        if (e.code === "KeyA") keys.A = false;
        if (e.code === "KeyS") keys.S = false;
        if (e.code === "KeyD") keys.D = false;
        if (e.code === "Space") keys.Space = false;
      });

      const eMute = document.getElementById("muteBtn");
      let isMuted = false;
      eMute.onclick = () => {
        isMuted = !isMuted;
        AudioBus.setMuted(isMuted);
        eMute.textContent = isMuted ? "🔇" : "🔊";
      };

      /* ================= Flow helpers ================= */
      let pauseToast = { text: "", t: 0 },
        toast = { text: "", t: 0 };

      function resetCoreState() {
        zombies.length = 0;
        bullets.length = 0;
        powerups.length = 0;
        particles.length = 0;
        hazards.length = 0;
        telegraphs.length = 0;
        bosses.length = 0;
        wave = 1;
        score = 0;
        elapsed = 0;
        lastShot = 0;
        fireDelay = baseFireDelay;
        effects.length = 0;
        player.multi = false;
        slowTarget = 1.0;
        slowTransition = 0;
        player.x = 0;
        player.y = 0;
        player.vx = 0;
        player.vy = 0;
        player.health = player.maxHealth;
        player.shieldHP = 0;
        }


      // Unified wave starter (used after countdown and between-waves)
      function startWave() {
        if (isBossWave()) {
          wavePlan = { remain: 0, spawnEvery: 999, acc: 0 };
          spawnBosses();
        } else {
          planWave();
        }
        state = "playing";
        AudioBus.fadeMusic(0, 0.2);
        AudioBus.playGame();
        AudioBus.setMusicLevel(0.5);
        AudioBus.SFX.waveStart();
      }

      function startGameWithCountdown() {
        resetCoreState();
        startCountdown = { n: 3, t: 0, active: true };
        state = "starting";
        AudioBus.playCalm();
        AudioBus.setMusicLevel(0.45);
        AudioBus.SFX.gameStart();
      }

function triggerGameOver() {
  if (state === "gameover") return;

  pauseUI.open = false;
  pauseUI.confirm = false;
  resumeTimer = 0;

  // big explosion burst
  for (let i = 0; i < 120; i++) {
    const a = Math.random() * Math.PI * 2;
    const sp = 2 + Math.random() * 6;
    particles.push({
      x: player.x,
      y: player.y,
      vx: Math.cos(a) * sp,
      vy: Math.sin(a) * sp,
      r: 2 + Math.random() * 3,
      color: i % 2 ? "cyan" : "yellow",
      life: 40 + Math.random() * 40,
    });
  }

  zombies.length = 0;
  bullets.length = 0;
  hazards.length = 0;
  telegraphs.length = 0;
  bosses.length = 0;

  AudioBus.fadeMusic(0, 0.6);
  setTimeout(() => {
    AudioBus.playCalm();
    AudioBus.setMusicLevel(0.45);
  }, 600);

  state = "gameover";
}

        // clear threats so nothing else advances
        zombies.length = 0;
        bullets.length = 0;
        powerups.length = 0;
        hazards.length = 0;
        telegraphs.length = 0;
        bosses.length = 0;

        // music swap
        AudioBus.fadeMusic(0, 0.8);
        setTimeout(() => {
          AudioBus.playCalm();
          AudioBus.setMusicLevel(0.45);
        }, 850);

        state = "gameover";
        particles = particles.slice(0, 60);
      }

      /* ================= Boss Update & Specials ================= */
      function updateBosses(dt) {
        if (!bosses.length) return;
        const tsec = dt / 1000;

        for (let bi = bosses.length - 1; bi >= 0; bi--) {
          const b = bosses[bi];
          const zx = player.x - b.x,
            zy = player.y - b.y,
            d = Math.hypot(zx, zy) || 1;
          const sp = b.baseSpeed * (b.speedScale || 1);
          b.x += (zx / d) * sp;
          b.y += (zy / d) * sp;
          const touchDist = playerDrawR + b.r - 2;
          if (Math.hypot(player.x - b.x, player.y - b.y) < touchDist) {
            // Per-second damage comparable to zombies; tweak if needed
            const perSecond = b.type === "main" ? 40 : 28; // main hurts more than mini
            let dmg = perSecond * 0.02; // ~per-frame at ~60fps (same pattern as zombies)

            if (player.shieldHP > 0) {
              const ab = Math.min(player.shieldHP, dmg);
              player.shieldHP -= ab;
              dmg -= ab;
              AudioBus.SFX.shieldHit();
            }
            if (dmg > 0) {
              player.health -= dmg;
              AudioBus.SFX.hit();
              if (player.health <= 0) {
                triggerGameOver();
                return; // stop further processing this tick
              }
            }
            shake = 6;
          }

          b.atkTimer += tsec;
          b.ringTimer += tsec;
          b.spawnTimer += tsec;

          if (b.type === "mini") {
            if (b.atkTimer > 0.9) {
              b.atkTimer = 0;
              const a = Math.atan2(player.y - b.y, player.x - b.x),
                spd = 6.2;
              hazards.push({ x: b.x, y: b.y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, r: 6, life: 2.8, dm: 28 });
            }
            if (b.ringTimer > 5) {
              b.ringTimer = 0;
              for (let k = 0; k < 8; k++) {
                const a = k * ((Math.PI * 2) / 8),
                  spd = 3.4;
                hazards.push({ x: b.x, y: b.y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, r: 5, life: 3, dm: 26 });
              }
            }
            if (b.spawnTimer > 7) {
              b.spawnTimer = 0;
              zombies.push(makeZombie(Math.random() < 0.4 ? "fast" : "normal"));
            }
            scheduleMiniBossSpecial(b, dt);
          } else {
            if (b.atkTimer > 0.6) {
              b.atkTimer = 0;
              const base = Math.atan2(player.y - b.y, player.x - b.x);
              [-0.18, 0, 0.18].forEach((off) => {
                const a = base + off,
                  spd = 6.8;
                hazards.push({ x: b.x, y: b.y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, r: 6, life: 3.2, dm: 34 });
              });
            }
            if (b.ringTimer > 4) {
              b.ringTimer = 0;
              for (let k = 0; k < 16; k++) {
                const a = k * ((Math.PI * 2) / 16),
                  spd = 3.2;
                hazards.push({ x: b.x, y: b.y, vx: Math.cos(a) * spd, vy: Math.sin(a) * spd, r: 5, life: 3.2, dm: 30 });
              }
            }
            if (b.spawnTimer > 6) {
              b.spawnTimer = 0;
              zombies.push(makeZombie("fast"));
              zombies.push(makeZombie(Math.random() < 0.5 ? "tank" : "normal"));
            }
            scheduleMainBossSpecial(b, dt);
          }

          if (b.pending) {
            b.pending.t -= tsec;
            if (b.pending.t <= 0) {
              const p = b.pending;
              b.pending = null;
              if (p.kind === "dash") {
                b.vx = Math.cos(p.a) * p.speed;
                b.vy = Math.sin(p.a) * p.speed;
                b.dashT = 0.5;
              } else if (p.kind === "spikes") {
                p.spots.forEach((s) => hazards.push({ type: "spike", x: s.x, y: s.y, r: 24, life: 0.6, dm: 28 }));
              } else if (p.kind === "laser") {
                b.laser = { ang: p.start, end: p.end, w: p.width, life: p.dur, base: p.base };
              } else if (p.kind === "teleportSlam") {
                b.x = p.tx;
                b.y = p.ty;
                burst(b.x, b.y, "yellow", 12);
                AudioBus.SFX.bossSlam();
                for (let k = 0; k < 12; k++) {
                  const a = k * ((Math.PI * 2) / 12),
                    spd = 3.5;
                  hazards.push({
                    x: b.x,
                    y: b.y,
                    vx: Math.cos(a) * spd,
                    vy: Math.sin(a) * spd,
                    r: 5,
                    life: 2.6,
                    dm: 32,
                  });
                }
              } else if (p.kind === "heal") {
                b.hp = Math.min(b.maxHp, b.hp + p.amount);
              } else if (p.kind === "rings") {
                for (let w = 0; w < p.waves; w++) {
                  setTimeout(() => {
                    for (let k = 0; k < 12; k++) {
                      const a = k * ((Math.PI * 2) / 12),
                        spd = 3.0;
                      hazards.push({
                        x: b.x,
                        y: b.y,
                        vx: Math.cos(a) * spd,
                        vy: Math.sin(a) * spd,
                        r: 5,
                        life: 3,
                        dm: 30,
                      });
                    }
                  }, w * 350);
                }
              } else if (p.kind === "surge") {
                b.baseSpeed *= 1.35;
                setTimeout(() => {
                  b.baseSpeed /= 1.35;
                }, 2000);
              }
            }
          }
          if (b.dashT) {
            b.x += b.vx;
            b.y += b.vy;
            b.dashT -= tsec;
            if (b.dashT <= 0) {
              b.vx = 0;
              b.vy = 0;
            }
          }
          if (b.laser) {
            b.laser.life -= tsec;
            const step = (b.laser.end - b.laser.ang) / Math.max(1, b.laser.life * 60);
            b.laser.ang += step * 2.2;
            if (b.laser.life <= 0) b.laser = null;
          }
        }
      }

      /* ================= Update ================= */
      function update(dt, ts) {

        if (state === "menu" || state === "tutorial" || state === "gameover" || state === "win") return;
        if (pauseUI.open) return;

        if (resumeTimer > 0) {
          const prev = Math.ceil(resumeTimer);
          resumeTimer -= dt / 1000;
          const cur = Math.ceil(Math.max(0, resumeTimer));
          if (cur !== prev && cur > 0) AudioBus.SFX.count(cur);
          if (resumeTimer <= 0) {
            resumeTimer = 0;
            state = "playing";
          }
          return;
        }

        if (state === "starting") {
          startCountdown.t += dt / 1000;
          if (startCountdown.t >= 0.85) {
            AudioBus.SFX.count(startCountdown.n);
            startCountdown.t = 0;
            startCountdown.n--;
            if (startCountdown.n <= 0) startWave();
          }
          return;
        }

        if (state === "dying") {
          for (let i = particles.length - 1; i >= 0; i--) {
            const p = particles[i];
            p.x += p.vx;
            p.y += p.vy;
            if (--p.life <= 0) particles.splice(i, 1);
          }
          if (shake > 0) shake -= 0.3;
          return;
        }

        if (state === "pausedBetween") {
          const prevInt = wavePausePrevInt;
          wavePause -= dt / 1000;
          const curInt = Math.ceil(Math.max(0, wavePause));
          if (prevInt !== curInt && curInt > 0 && curInt <= 3) {
            AudioBus.SFX.count(curInt);
          }
          wavePausePrevInt = curInt;
          if (wavePause <= 0) {
            startWave();
          }
          return;
        }

        // playing
        elapsed += dt / 1000;

        if (!bosses.length && wavePlan.remain > 0) {
          wavePlan.acc += dt / 1000;
          while (wavePlan.acc >= wavePlan.spawnEvery && wavePlan.remain > 0) {
            wavePlan.acc -= wavePlan.spawnEvery;
            wavePlan.remain--;
            spawnOneZombie();
          }
        }

        // movement
        const jx = joystick.stickX / joystick.baseR,
          jy = joystick.stickY / joystick.baseR;
        let dx = jx,
          dy = jy;
        if (keys.W) dy -= 1;
        if (keys.S) dy += 1;
        if (keys.A) dx -= 1;
        if (keys.D) dx += 1;
        const len = Math.hypot(dx, dy) || 1;
        dx /= len;
        dy /= len;
        const acc = 0.4,
          maxSp = 5;
        player.vx += dx * acc;
        player.vy += dy * acc;
        player.vx *= 0.9;
        player.vy *= 0.9;
        const sp = Math.hypot(player.vx, player.vy);
        if (sp > maxSp) {
          player.vx = (player.vx / sp) * maxSp;
          player.vy = (player.vy / sp) * maxSp;
        }
        player.x += player.vx;
        player.y += player.vy;

        // bullets
        const W = canvas.clientWidth,
          H = canvas.clientHeight;
        for (let i = bullets.length - 1; i >= 0; i--) {
          const b = bullets[i];
          b.x += b.vx;
          b.y += b.vy;
          const sx = W / 2 + (b.x - player.x),
            sy = H / 2 + (b.y - player.y);
          if (sx < -20 || sx > W + 20 || sy < -20 || sy > H + 20) bullets.splice(i, 1);
        }

        // slow easing
        if (slowTransition > 0) {
          const step = dt / 1000 / slowTransition;
          zombies.forEach((z) => {
            z.speedScale = z.speedScale + (slowTarget - z.speedScale) * Math.min(1, step);
          });
          if (bosses.length)
            bosses.forEach((b) => {
              b.speedScale = b.speedScale + (slowTarget - b.speedScale) * Math.min(1, step);
            });
          slowTransition -= dt / 1000;
          if (slowTransition < 0) slowTransition = 0;
        }

        // zombies
        for (let i = zombies.length - 1; i >= 0; i--) {
          const z = zombies[i];
          z.trail = z.trail || [];
          z.trail.push({ x: z.x, y: z.y });
          if (z.trail.length > 6) z.trail.shift();
          const zx = player.x - z.x,
            zy = player.y - z.y,
            d = Math.hypot(zx, zy) || 1;
          z.x += (zx / d) * (z.speed * (z.speedScale ?? 1));
          z.y += (zy / d) * (z.speed * (z.speedScale ?? 1));
          if (Math.hypot(player.x - z.x, player.y - z.y) < playerDrawR + z.r - 2) {
            let dmg = z.dmg * 0.02;
            if (player.shieldHP > 0) {
              const ab = Math.min(player.shieldHP, dmg);
              player.shieldHP -= ab;
              dmg -= ab;
              AudioBus.SFX.shieldHit();
            }
            if (dmg > 0) {
              player.health -= dmg;
              AudioBus.SFX.hit();
              if (player.health <= 0) {
                triggerGameOver();
                return;
              }
            }
            shake = 6;
          }
          for (let j = bullets.length - 1; j >= 0; j--) {
            const b = bullets[j];
            if (Math.hypot(b.x - z.x, b.y - z.y) < b.r + z.r) {
              z.hp--;
              burst(b.x, b.y, "red", 6);
              bullets.splice(j, 1);
              if (z.hp <= 0) {
                if (z.type === "fast") score += 1;
                else if (z.type === "normal") score += 2;
                else if (z.type === "tank") score += 3;
                AudioBus.SFX.kill();
                burst(z.x, z.y, "red", 18);
                tryDrop(z.x, z.y);
                zombies.splice(i, 1);
              }
              break;
            }
          }
        }

        // bosses
        updateBosses(dt);

        // bullets vs bosses
        for (let bi = bullets.length - 1; bi >= 0; bi--) {
          const b = bullets[bi];
          let hit = false;
          for (let k = bosses.length - 1; k >= 0; k--) {
            const boss = bosses[k];
            if (Math.hypot(b.x - boss.x, b.y - boss.y) < b.r + boss.r) {
              bullets.splice(bi, 1);
              hit = true;
              boss.hp--;
              burst(b.x, b.y, "yellow", 4);
              if (boss.hp <= 0) {
                if (boss.type === "main") score += 50;
                else if (boss.type === "mini") score += 10;
                burst(boss.x, boss.y, "yellow", 30);
                bosses.splice(k, 1);
                AudioBus.SFX.bossSlam();
              }
              break;
            }
          }
          if (hit) continue;
        }

        // hazards
        for (let i = hazards.length - 1; i >= 0; i--) {
          const h = hazards[i];
          if (h.type === "spike") {
            h.life -= dt / 1000;
            if (h.life <= 0) {
              hazards.splice(i, 1);
              continue;
            }
            if (Math.hypot(player.x - h.x, player.y - h.y) < playerDrawR + h.r) {
              let dmg = (h.dm || 16) * 0.05;
              if (player.shieldHP > 0) {
                const ab = Math.min(player.shieldHP, dmg);
                player.shieldHP -= ab;
                dmg -= ab;
                AudioBus.SFX.shieldHit();
              }
              if (dmg > 0) {
                player.health -= dmg;
                AudioBus.SFX.hit();
                if (player.health <= 0) {
                  triggerGameOver();
                  return;
                }
              }
              hazards.splice(i, 1);
              continue;
            }
          } else {
            h.x += h.vx;
            h.y += h.vy;
            h.life -= dt / 1000;
            if (h.life <= 0) {
              hazards.splice(i, 1);
              continue;
            }
            if (Math.hypot(player.x - h.x, player.y - h.y) < playerDrawR + h.r) {
              let dmg = (h.dm || 10) * 0.05;
              if (player.shieldHP > 0) {
                const ab = Math.min(player.shieldHP, dmg);
                player.shieldHP -= ab;
                dmg -= ab;
                AudioBus.SFX.shieldHit();
              }
              if (dmg > 0) {
                player.health -= dmg;
                AudioBus.SFX.hit();
                if (player.health <= 0) {
                  triggerGameOver();
                  return;
                }
              }

              hazards.splice(i, 1);
              continue;
            }
          }
        }

        // boss lasers damage (fixed distance math)
        bosses.forEach((b) => {
          if (!b.laser) return;
          const angTo = Math.atan2(player.y - b.y, player.x - b.x);
          let diff = Math.atan2(Math.sin(angTo - b.laser.ang), Math.cos(angTo - b.laser.ang));
          const dist = Math.hypot(player.x - b.x, player.y - b.y);
          if (Math.abs(diff) < b.laser.w && dist < 300) {
            let dmg = 34 * 0.04;
            if (player.shieldHP > 0) {
              const ab = Math.min(player.shieldHP, dmg);
              player.shieldHP -= ab;
              dmg -= ab;
              AudioBus.SFX.shieldHit();
            }
            if (dmg > 0) {
              player.health -= dmg;
              AudioBus.SFX.hit();
              if (player.health <= 0) {
                triggerGameOver();
                return;
              }
            }
          }
        });

        // auto-shoot
        tryAutoShoot(ts);

        // powerups
        for (let i = powerups.length - 1; i >= 0; i--) {
          const p = powerups[i];
          p.age += dt / 1000;
          p.blink = p.age >= 3.5 && p.age < 5;
          if (p.age >= 5) {
            powerups.splice(i, 1);
            continue;
          }
          if (Math.hypot(player.x - p.x, player.y - p.y) < playerDrawR + p.r) {
            if (p.type === "shield") {
              player.shieldHP = player.maxShield;
              AudioBus.SFX.pickup.shield();
            } else if (p.type === "multi") {
              player.multi = true;
              upsertEffect("multi", 15);
              AudioBus.SFX.pickup.multi();
            } else if (p.type === "rapid") {
              fireDelay = baseFireDelay / 2;
              upsertEffect("rapid", 15);
              AudioBus.SFX.pickup.rapid();
            } else if (p.type === "slow") {
              applySlow(true);
              upsertEffect("slow", 15);
              AudioBus.SFX.pickup.slow();
            } else if (p.type === "heal") {
              player.health = player.maxHealth;
              AudioBus.SFX.pickup.heal();
            } else if (p.type === "nuke") {
              for (let k = zombies.length - 1; k >= 0; k--) {
                burst(zombies[k].x, zombies[k].y, "red", 24);
                score += 12;
              }
              zombies.length = 0;
              shake = 10;
              AudioBus.SFX.pickup.nuke();
            }
            toast = { text: labelFor(p.type) + " ACQUIRED!", t: 1.2 };
            powerups.splice(i, 1);
          }
        }

        // effects countdown
        for (let i = effects.length - 1; i >= 0; i--) {
          const e = effects[i];
          e.remain -= dt / 1000;
          if (e.type === "slow" && e.remain <= 0.5 && slowTarget !== 1.0) applySlow(false);
          if (e.remain <= 0) endEffect(e.type);
        }

        // particles
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx;
          p.y += p.vy;
          if (--p.life <= 0) particles.splice(i, 1);
        }

        // telegraphs
        for (let i = telegraphs.length - 1; i >= 0; i--) {
          const t = telegraphs[i];
          t.time += dt / 1000;
          if (t.time >= t.max) telegraphs.splice(i, 1);
        }

        // wave end → pause with countdown SFX
        if (state === "playing" && !bosses.length && zombies.length === 0 && wavePlan.remain === 0) {
          state = "pausedBetween";
          wavePause = 3;
          wavePausePrevInt = null;
          wave++;
        }
      }

      /* ================= Drawing ================= */
      function labelBG(x, y, w, h, a = 0.6) {
        ctx.save();
        ctx.globalAlpha = a;
        ctx.fillStyle = "#000";
        const r = 8;
        ctx.beginPath();
        ctx.moveTo(x + r, y);
        ctx.arcTo(x + w, y, x + w, y + h, r);
        ctx.arcTo(x + w, y + h, x, y + h, r);
        ctx.arcTo(x, y + h, x, y, r);
        ctx.arcTo(x, y, x + w, y, r);
        ctx.closePath();
        ctx.fill();
        ctx.restore();
      }
      function drawBtn(cx, cy, w, h, txt) {
        labelBG(cx - w / 2, cy - h / 2, w, h, 0.75);
        ctx.fillStyle = "#fff";
        ctx.font = "16px Nunito, system-ui";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(txt, cx, cy);
      }

      // track tutorial start button rect dynamically
      let tutorialBtnRect = null;

      function wrapText(ctx, text, maxWidth) {
        const words = text.split(" ");
        const lines = [];
        let line = "";
        for (const w of words) {
          const test = line ? line + " " + w : w;
          if (ctx.measureText(test).width <= maxWidth) {
            line = test;
          } else {
            if (line) lines.push(line);
            line = w;
          }
        }
        if (line) lines.push(line);
        return lines;
      }

      function draw() {
        const W = canvas.clientWidth,
          H = canvas.clientHeight;
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        if (shake > 0) {
          ctx.translate((Math.random() - 0.5) * shake, (Math.random() - 0.5) * shake);
          shake -= 0.3;
          if (shake < 0) shake = 0;
        }

        // background grid
        const g = ctx.createLinearGradient(0, 0, W, H);
        g.addColorStop(0, "#222");
        g.addColorStop(1, "#111");
        ctx.fillStyle = g;
        ctx.fillRect(0, 0, W, H);
        ctx.strokeStyle = "#2b2b2b";
        ctx.lineWidth = 1;
        for (let x = -1000; x <= 1000; x += 60) {
          const sx = Math.round(W / 2 + x - (player.x % 60));
          ctx.beginPath();
          ctx.moveTo(sx, 0);
          ctx.lineTo(sx, H);
          ctx.stroke();
        }
        for (let y = -1000; y <= 1000; y += 60) {
          const sy = Math.round(H / 2 + y - (player.y % 60));
          ctx.beginPath();
          ctx.moveTo(0, sy);
          ctx.lineTo(W, sy);
          ctx.stroke();
        }

        // telegraphs behind
        drawTelegraphs();

        // bullets
        ctx.fillStyle = "yellow";
        bullets.forEach((b) => {
          const sx = W / 2 + (b.x - player.x),
            sy = H / 2 + (b.y - player.y);
          ctx.beginPath();
          ctx.arc(sx, sy, b.r, 0, Math.PI * 2);
          ctx.fill();
        });

        // bosses
        bosses.forEach((boss) => {
          const bx = W / 2 + (boss.x - player.x),
            by = H / 2 + (boss.y - player.y);
          ctx.globalAlpha = 0.25;
          for (let r = 0; r < 6; r++) {
            ctx.beginPath();
            ctx.arc(bx, by, boss.r + r * 3, 0, Math.PI * 2);
            ctx.strokeStyle = boss.type === "main" ? "rgba(255,80,80,.2)" : "rgba(255,200,120,.2)";
            ctx.stroke();
          }
          ctx.globalAlpha = 1;
          ctx.fillStyle = boss.type === "main" ? "#ff5a5a" : "#ffb35a";
          ctx.beginPath();
          ctx.arc(bx, by, boss.r, 0, Math.PI * 2);
          ctx.fill();
          if (boss.type === "main") {
            ctx.fillStyle = "#ffd84d";
            ctx.beginPath();
            ctx.moveTo(bx - 22, by - boss.r - 6);
            ctx.lineTo(bx - 12, by - boss.r - 20);
            ctx.lineTo(bx, by - boss.r - 8);
            ctx.lineTo(bx + 12, by - boss.r - 20);
            ctx.lineTo(bx + 22, by - boss.r - 6);
            ctx.closePath();
            ctx.fill();
          } else {
            ctx.strokeStyle = "#fff";
            ctx.beginPath();
            for (let s = 0; s < 6; s++) {
              const a = s * (Math.PI / 3),
                ex = bx + Math.cos(a) * (boss.r + 8),
                ey = by + Math.sin(a) * (boss.r + 8);
              ctx.moveTo(bx, by);
              ctx.lineTo(ex, ey);
            }
            ctx.stroke();
          }
          if (boss.laser) {
            const a = boss.laser.ang,
              bw = 6;
            ctx.save();
            ctx.strokeStyle = "rgba(255,0,0,0.8)";
            ctx.lineWidth = bw;
            ctx.beginPath();
            const ex = bx + Math.cos(a) * 300,
              ey = by + Math.sin(a) * 300;
            ctx.moveTo(bx, by);
            ctx.lineTo(ex, ey);
            ctx.stroke();
            ctx.restore();
          }
        });

        // zombies
        zombies.forEach((z) => {
          const sx = W / 2 + (z.x - player.x),
            sy = H / 2 + (z.y - player.y);
          ctx.globalAlpha = 0.25;
          (z.trail || []).forEach((t) => {
            const tx = W / 2 + (t.x - player.x),
              ty = H / 2 + (t.y - player.y);
            drawSprite(z.type === "tank" ? "z_tank" : z.type === "fast" ? "z_fast" : "z_norm", tx, ty, z.r * 2);
          });
          ctx.globalAlpha = 1;
          drawSprite(z.type === "tank" ? "z_tank" : z.type === "fast" ? "z_fast" : "z_norm", sx, sy, z.r * 2);
          const frac = Math.max(0, z.hp) / z.maxHp;
          ctx.fillStyle = "rgba(255,255,255,.25)";
          ctx.fillRect(sx - z.r, sy - z.r - 8, z.r * 2, 5);
          ctx.fillStyle = "red";
          ctx.fillRect(sx - z.r, sy - z.r - 8, z.r * 2 * frac, 5);
        });

        // hazards
        ctx.fillStyle = "#ffdd55";
        hazards.forEach((h) => {
          const sx = W / 2 + (h.x - player.x),
            sy = H / 2 + (h.y - player.y);
          if (h.type === "spike") {
            ctx.fillStyle = "#ff6a6a";
            ctx.beginPath();
            ctx.arc(sx, sy, h.r, 0, Math.PI * 2);
            ctx.fill();
            ctx.fillStyle = "#ffdd55";
          } else {
            ctx.beginPath();
            ctx.arc(sx, sy, h.r, 0, Math.PI * 2);
            ctx.fill();
          }
        });

        // powerups
        powerups.forEach((p) => {
          const sx = W / 2 + (p.x - player.x),
            sy = H / 2 + (p.y - player.y);
          if (!p.blink || Math.floor(p.age * 10) % 2 === 0) {
            drawSprite(p.type, sx, sy, 36);
            const txt = labelFor(p.type);
            ctx.font = '12px "Press Start 2P", monospace';
            const tw = ctx.measureText(txt).width + 12;
            labelBG(sx - tw / 2, sy - 30, tw, 18, 0.7);
            ctx.fillStyle = "#fff";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(txt, sx, sy - 21);
          }
        });

        // particles
        particles.forEach((pt) => {
          const sx = W / 2 + (pt.x - player.x),
            sy = H / 2 + (pt.y - player.y);
          ctx.fillStyle = pt.color;
          ctx.beginPath();
          ctx.arc(sx, sy, pt.r, 0, Math.PI * 2);
          ctx.fill();
        });

        // player (solid green orb)
        const px = W / 2,
          py = H / 2;
        ctx.beginPath();
        ctx.arc(px, py, playerDrawR, 0, Math.PI * 2);
        ctx.fillStyle = "#50ff78";
        ctx.fill();
        ctx.lineWidth = 2;
        ctx.strokeStyle = "#007800";
        ctx.stroke();

        // HUD health/shield
        const hbW = 140,
          hbH = 10;
        let bx = px - hbW / 2,
          by = py + playerDrawR + 25;
        if (player.shieldHP > 0) {
          ctx.fillStyle = "#fff";
          ctx.fillRect(bx - 2, by - 2, hbW + 4, hbH + 4);
          ctx.fillStyle = "#222";
          ctx.fillRect(bx, by, hbW, hbH);
          ctx.fillStyle = "#4ecbff";
          ctx.fillRect(bx, by, hbW * (player.shieldHP / player.maxShield), hbH);
          ctx.strokeStyle = "#000";
          ctx.strokeRect(bx, by, hbW, hbH);
          by += hbH + 6;
          ctx.fillStyle = "#fff";
          ctx.fillRect(bx - 2, by - 2, hbW + 4, hbH + 4);
          ctx.fillStyle = "#222";
          ctx.fillRect(bx, by, hbW, hbH);
          ctx.fillStyle = "red";
          ctx.fillRect(bx, by, hbW * (player.health / player.maxHealth), hbH);
          ctx.strokeStyle = "#000";
          ctx.strokeRect(bx, by, hbW, hbH);
          ctx.strokeStyle = "#4ecbff";
          ctx.lineWidth = 3;
          ctx.beginPath();
          ctx.arc(px, py, playerDrawR + 10, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          ctx.fillStyle = "#fff";
          ctx.fillRect(bx - 2, by - 2, hbW + 4, hbH + 4);
          ctx.fillStyle = "#222";
          ctx.fillRect(bx, by, hbW, hbH);
          ctx.fillStyle = "red";
          ctx.fillRect(bx, by, hbW * (player.health / player.maxHealth), hbH);
          ctx.strokeStyle = "#000";
          ctx.strokeRect(bx, by, hbW, hbH);
        }

        // joystick + shoot
        ctx.globalAlpha = 0.9;
        ctx.fillStyle = "rgba(255,255,255,.06)";
        ctx.beginPath();
        ctx.arc(joystick.cx, joystick.cy, joystick.baseR, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(200,200,200,.18)";
        ctx.beginPath();
        ctx.arc(joystick.cx + joystick.stickX, joystick.cy + joystick.stickY, joystick.stickR, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = shootBtn.pressed ? "#ff8c42" : "#d93b3b";
        ctx.beginPath();
        ctx.arc(shootBtn.cx, shootBtn.cy, shootBtn.r, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#fff";
        ctx.font = "bold 14px Nunito, system-ui";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText("SHOOT", shootBtn.cx, shootBtn.cy);
        ctx.restore();

        // HUD (playing or between waves)
        if (state === "playing" || state === "pausedBetween") {
          ctx.font = '12px "Press Start 2P", monospace';
          ctx.fillStyle = "#fff";
          ctx.textAlign = "left";
          ctx.textBaseline = "top";
          const lines = [
            `Score: ${Math.floor(score)}`,
            `Wave: ${wave}${isBossWave() ? " (BOSS)" : ""}`,
            `Zombies: ${zombies.length + bosses.length + wavePlan.remain}`,
            `Time: ${Math.floor(elapsed)}s`,
          ];
          const x = 12,
            y = 12,
            w = Math.max(...lines.map((t) => ctx.measureText(t).width)) + 20;
          labelBG(x, y, w, 84, 0.55);
          let yy = y + 8;
          lines.forEach((t) => {
            ctx.fillText(t, x + 10, yy);
            yy += 20;
          });

          if (bosses.length) {
            const bw = Math.min(260, W - 40),
              gap = 8;
            let byTop = 10;
            for (let i = 0; i < bosses.length; i++) {
              const b = bosses[i],
                bxTop = (W - bw) / 2,
                frac = Math.max(0, b.hp / b.maxHp);
              labelBG(bxTop - 6, byTop - 4, bw + 12, 20, 0.5);
              ctx.fillStyle = "#550";
              ctx.fillRect(bxTop, byTop, bw, 12);
              ctx.fillStyle = b.type === "main" ? "#ff5555" : "#ffb366";
              ctx.fillRect(bxTop, byTop, bw * frac, 12);
              ctx.strokeStyle = "#000";
              ctx.strokeRect(bxTop, byTop, bw, 12);
              ctx.fillStyle = "#fff";
              ctx.font = '10px "Press Start 2P", monospace';
              ctx.textAlign = "center";
              ctx.textBaseline = "top";
              ctx.fillText(b.type === "main" ? "BOSS" : "MINI", bxTop + bw / 2, byTop + 14);
              byTop += 14 + gap;
            }
          }

          // pause button
          ctx.save();
          ctx.globalAlpha = 0.9;
          ctx.fillStyle = "rgba(0,0,0,.5)";
          ctx.beginPath();
          ctx.arc(pauseBtn.x, pauseBtn.y, pauseBtn.r, 0, Math.PI * 2);
          ctx.fill();
          ctx.strokeStyle = "#fff";
          ctx.lineWidth = 3;
          ctx.lineCap = "round";
          ctx.beginPath();
          ctx.moveTo(pauseBtn.x - 6, pauseBtn.y - 8);
          ctx.lineTo(pauseBtn.x - 6, pauseBtn.y + 8);
          ctx.moveTo(pauseBtn.x + 6, pauseBtn.y - 8);
          ctx.lineTo(pauseBtn.x + 6, pauseBtn.y + 8);
          ctx.stroke();
          ctx.restore();

          if (state === "pausedBetween") {
            const txt = `Next wave starts in ${Math.ceil(wavePause)}s`;
            const tw = ctx.measureText(txt).width + 20;
            labelBG((W - tw) / 2, H / 2 - 18, tw, 36, 0.6);
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillStyle = "#fff";
            ctx.fillText(txt, W / 2, H / 2);
          }
        }

        // Toast
        if (toast.t > 0) {
          toast.t -= 0.016;
          const t = toast.text;
          ctx.font = '14px "Press Start 2P", monospace';
          const tw = ctx.measureText(t).width + 24;
          const x = (W - tw) / 2,
            y = 80;
          labelBG(x, y, tw, 28, 0.7);
          ctx.fillStyle = "#ffeb7a";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(t, W / 2, y + 14);
        }

        // Effect bars (bottom-left under HUD)
        if (effects.length) {
          const m = 12,
            barW = Math.min(180, W * 0.45),
            barH = 14;

          let bxE = m;
          let byE = 12 + 84 + 10;

          for (let i = effects.length - 1; i >= 0; i--) {
            const e = effects[i],
              frac = Math.max(0, e.remain / e.dur),
              blink = e.remain <= 2 && Math.floor(e.remain * 10) % 2 === 0;

            labelBG(bxE - 6, byE - 4, barW + 12, barH + 8, 0.6);
            ctx.fillStyle = e.color;
            ctx.globalAlpha = blink ? 0.5 : 1;
            ctx.fillRect(bxE, byE, barW * frac, barH);
            ctx.globalAlpha = 1;

            ctx.fillStyle = "#fff";
            ctx.font = '11px "Press Start 2P", monospace';
            ctx.textAlign = "left";
            ctx.textBaseline = "middle";
            ctx.fillText(e.type.toUpperCase(), bxE + 6, byE + barH / 2);

            byE += barH + 10;
          }
        }

        // Overlays
        if (state === "menu") {
          ctx.textAlign = "center";
          ctx.font = '32px "Press Start 2P", monospace';
          ctx.fillStyle = "#ffcc33";
          const title = "ORB ARENA";
          const tw = ctx.measureText(title).width + 30;
          labelBG(W / 2 - tw / 2, 60, tw, 40, 0.7);
          ctx.fillText(title, W / 2, 80);
          ctx.font = "14px Nunito, system-ui";
          ctx.fillStyle = "#fff";
          ctx.fillText("Beat the zombie orbs. Ensure victory. Score high.", W / 2, 120);
          ctx.fillText("Auto-aim is turned on due to successively increasing", W / 2, 150);
          ctx.fillText("difficulty.", W / 2, 170);
          drawBtn(W / 2, H / 2 + 90, 170, 56, "PLAY");
        }

        if (state === "tutorial") {
          const pad = 14;
          const Wp = Math.min(460, W - 20);
          const Hp = Math.min(H - 40, 620);
          const X = (W - Wp) / 2;
          const Y = (H - Hp) / 2;
          labelBG(X, Y, Wp, Hp, 0.85);

          ctx.textAlign = "center";
          ctx.font = '22px "Press Start 2P", monospace';
          ctx.fillStyle = "#ffcc33";
          ctx.fillText("TUTORIAL", W / 2, Y + 30);

          const btnW = 200,
            btnH = 56;
          const contentTop = Y + 54;
          const contentBottom = Y + Hp - pad - (btnH + 16);
          const contentAvailPx = Math.max(120, contentBottom - contentTop);
          const contentBaseH = 560;
          const s = Math.min(1, contentAvailPx / contentBaseH);

          ctx.save();
          ctx.translate(X + pad, contentTop);
          ctx.scale(s, s);

          let cx = 0,
            cy = 0;
          const rowH = 42;

          ctx.textAlign = "left";
          ctx.font = '12px "Press Start 2P", monospace';
          ctx.fillStyle = "#ffdd55";
          ctx.fillText("Controls", cx, cy);
          cy += 18;
          ctx.fillStyle = "#fff";
          ctx.font = "12px Nunito, system-ui";
          ctx.fillText("Desktop: WASD to move; Click or Space to shoot.", cx, cy);
          cy += 18;
          ctx.fillText("Mobile: Left joystick to move; Right red button shoots.", cx, cy);
          cy += 24;

          ctx.font = '12px "Press Start 2P", monospace';
          ctx.fillStyle = "#ffdd55";
          ctx.fillText("Objective", cx, cy);
          cy += 18;
          ctx.fillStyle = "#fff";
          ctx.font = "12px Nunito, system-ui";
          ctx.fillText(
            "Survive waves. Kill zombies. Avoid contact. Special Mini Boss/Boss rounds at 5/10/15...",
            cx,
            cy,
          );
          cy += 24;

          ctx.font = '12px "Press Start 2P", monospace';
          ctx.fillStyle = "#ffdd55";
          ctx.fillText("Zombies", cx, cy);
          cy += 18;

          const drawLine = (icon, label, desc, sprSize = 36) => {
            drawSprite(icon, cx + 16, cy + 16, sprSize);
            ctx.fillStyle = "#fff";
            ctx.font = "12px Nunito, system-ui";
            ctx.fillText(`${label}: ${desc}`, cx + 44, cy + 12);
            cy += rowH;
          };

          drawLine("z_fast", "Fast", "quick, low HP & damage. 1 point.", 32);
          drawLine("z_norm", "Normal", "steady speed, decent HP, medium damage. 2 points.", 36);
          drawLine("z_tank", "Tank", "slow, high HP, heavy damage. 3 points.", 40);
          cy += 6;

          ctx.font = '12px "Press Start 2P", monospace';
          ctx.fillStyle = "#ffdd55";
          ctx.fillText("Powerups", cx, cy);
          cy += 16;

          let bodySize = 12;
          if (W < 380) bodySize = 11;
          ctx.font = bodySize + "px Nunito, system-ui";
          const lineH = Math.round(bodySize * 1.28);

          const iconSize = 36;
          const textX = cx + 44;
          const textMaxW = X + Wp - 14 - textX;

          const drawPLine = (iconKey, label, desc) => {
            drawSprite(iconKey, cx + 16, cy + 16, iconSize);
            const lines = wrapText(ctx, `${label}: ${desc}`, textMaxW);
            for (let i = 0; i < lines.length; i++) {
              ctx.fillStyle = "#fff";
              ctx.fillText(lines[i], textX, cy + 12 + i * lineH);
            }
            const usedH = Math.max(42, 12 + lines.length * lineH);
            cy += usedH;
          };

          drawPLine("shield", "Shield", "Refills blue bar; absorbs damage, drains when hit.");
          drawPLine("multi", "Multi", "5-shot spread for 15s (shows as effect bar).");
          drawPLine("rapid", "Rapid", "Faster fire for 15s (shows as effect bar).");
          drawPLine("slow", "Slow", "Slows enemies for 15s.");
          drawPLine("heal", "Full Health", "Instantly heal to max.");
          drawPLine("nuke", "Nuke", "Wipes all spawned zombies (rare).");

          ctx.font = '12px "Press Start 2P", monospace';
          ctx.fillStyle = "#ff7777";
          ctx.fillText("Bosses", cx, cy);
          cy += 18;
          ctx.fillStyle = "#fff";
          ctx.font = "12px Nunito, system-ui";
          ctx.fillText("Mini-Boss: dashes, ground spikes, rings, volleys. 10 points.", cx, cy);
          cy += 18;
          ctx.fillText("Main Boss: laser sweep, teleport+slam, heal, storms, surge. 50 points.", cx, cy);
          cy += 18;
          ctx.fillText("Mini Boss rounds: 5/15/25…, Boss rounds: 10/20/30….", cx, cy);

          ctx.restore();

          const btnY = Y + Hp - 56 / 2 - 12;
          drawBtn(W / 2, btnY, 200, 56, "START GAME");
          tutorialBtnRect = { x: W / 2, y: btnY, w: 200, h: 56 };
        }

        if (state === "starting") {
          const head = "Game starts in";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.font = "16px Nunito, system-ui";
          ctx.fillStyle = "#fff";
          const hw = ctx.measureText(head).width + 24;
          labelBG(W / 2 - hw / 2, H / 2 - 100, hw, 30, 0.7);
          ctx.fillText(head, W / 2, H / 2 - 85);
          const num = startCountdown.n > 0 ? startCountdown.n : 1;
          ctx.font = '64px "Press Start 2P", monospace';
          ctx.fillStyle = "#ffdd55";
          const nw = ctx.measureText(String(num)).width + 40;
          labelBG(W / 2 - nw / 2, H / 2 - 34, nw, 56, 0.7);
          ctx.fillText(num, W / 2, H / 2 - 6);
        }

        if (state === "dying") {
          ctx.save();
          ctx.fillStyle = "rgba(0,0,0,.15)";
          ctx.fillRect(0, 0, W, H);
          ctx.restore();
        }

 if (state === "gameover") {
  ctx.save();
  ctx.fillStyle = "rgba(0,0,0,0.8)";
  ctx.fillRect(0, 0, W, H);

  ctx.textAlign = "center";

  ctx.font = '40px "Press Start 2P", monospace';
  ctx.fillStyle = "#ff4f4f";
  ctx.fillText("GAME OVER", W / 2, H / 2 - 120);

  ctx.font = "16px Nunito, system-ui";
  ctx.fillStyle = "#fff";
  ctx.fillText(`Final Score: ${Math.floor(score)}`, W / 2, H / 2 - 50);
  ctx.fillText(`Waves Survived: ${wave}`, W / 2, H / 2 - 20);

  drawBtn(W / 2 - 140, H / 2 + 100, 180, 60, "Restart");
  drawBtn(W / 2 + 140, H / 2 + 100, 180, 60, "Menu");

  ctx.restore();
}

        if (pauseUI.open) {
          const Ww = canvas.clientWidth,
            Hh = canvas.clientHeight;

          ctx.save();
          ctx.fillStyle = "rgba(0,0,0,.4)";
          ctx.fillRect(0, 0, Ww, Hh);
          ctx.restore();

          const mw = Math.min(300, Ww - 40),
            mh = 220;
          const mx = (Ww - mw) / 2,
            my = (Hh - mh) / 2;

          labelBG(mx, my, mw, mh, 0.85);

          ctx.textAlign = "center";
          ctx.font = '24px "Press Start 2P", monospace';
          ctx.fillStyle = "#ffcc33";
          ctx.fillText(pauseUI.confirm ? "ARE YOU SURE?" : "PAUSED", Ww / 2, my + 40);

          const drawBtnLite = (x, y, w, h, t) => {
            labelBG(x - w / 2, y - h / 2, w, h, 0.6);
            ctx.fillStyle = "#fff";
            ctx.font = "14px Nunito, system-ui";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";
            ctx.fillText(t, x, y);
          };

          const CONT_Y = my + mh - 100;
          const EXIT_Y = my + mh - 50;

          if (!pauseUI.confirm) {
            drawBtnLite(Ww / 2, CONT_Y, 160, 48, "Continue");
            drawBtnLite(Ww / 2, EXIT_Y, 160, 48, "Exit to Menu");
          } else {
            drawBtnLite(Ww / 2 - 80, my + mh - 40, 120, 48, "Yes");
            drawBtnLite(Ww / 2 + 80, my + mh - 40, 120, 48, "No");
          }
        }
        if (resumeTimer > 0) {
          const txt = `Continuing in ${Math.ceil(resumeTimer)}s`;
          const tw = ctx.measureText(txt).width + 20;
          labelBG((W - tw) / 2, H / 2 - 18, tw, 36, 0.6);
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillStyle = "#fff";
          ctx.fillText(txt, W / 2, H / 2);
        }

        if (bossAlert.t > 0) {
          bossAlert.t -= 0.016;
          const txt = bossAlert.text;
          ctx.font = '14px "Press Start 2P", monospace';
          const tw = ctx.measureText(txt).width + 24;
          labelBG((W - tw) / 2, 16, tw, 28, 0.7);
          ctx.fillStyle = "#ff6666";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(txt, W / 2, 30);
        }
      }

      /* ================= Loop & Clicks ================= */
      canvas.addEventListener("click", (e) => {
        const r = canvas.getBoundingClientRect(),
          x = e.clientX - r.left,
          y = e.clientY - r.top,
          W = canvas.clientWidth,
          H = canvas.clientHeight;
        const inside = (B) => Math.abs(x - B.x) <= B.w / 2 && Math.abs(y - B.y) <= B.h / 2;

        if (pauseUI.open) {
          const mw = Math.min(300, W - 40),
            mh = 220,
            mx = (W - mw) / 2,
            my = (H - mh) / 2;
          const b = (cx, cy, w, h) => ({ x: cx, y: cy, w, h });
          const CONT_Y = my + mh - 100;
          const EXIT_Y = my + mh - 50;

          if (!pauseUI.confirm) {
            const cont = b(W / 2, CONT_Y, 160, 48);
            const ext = b(W / 2, EXIT_Y, 160, 48);

            if (inside(cont)) {
              AudioBus.SFX.button();
              pauseUI.open = false;
              resumeTimer = 3;
              resumeCount = 3;
              return;
            }
            if (inside(ext)) {
              AudioBus.SFX.button();
              pauseUI.confirm = true;
              return;
            }
          } else {
            const yes = b(W / 2 - 80, my + mh - 40, 120, 48);
            const no = b(W / 2 + 80, my + mh - 40, 120, 48);

            if (inside(yes)) {
              AudioBus.SFX.button();
              pauseUI.open = false;
              pauseUI.confirm = false;
              state = "menu";
              return;
            }
            if (inside(no)) {
              AudioBus.SFX.button();
              pauseUI.confirm = false;
              return;
            }
          }
          return;
        }

        if (state === "menu") {
          const play = { x: W / 2, y: H / 2 + 90, w: 170, h: 56 };
          if (inside(play)) {
            AudioBus.SFX.button();
            state = "tutorial";
            return;
          }
        } else if (state === "tutorial") {
          if (tutorialBtnRect && inside(tutorialBtnRect)) {
            AudioBus.SFX.button();
            startGameWithCountdown();
            return;
          }
        } else if (state === "gameover") {

  const restart = { x: W / 2 - 140, y: H / 2 + 100, w: 180, h: 60 };
  const menu = { x: W / 2 + 140, y: H / 2 + 100, w: 180, h: 60 };

  if (inside(restart)) {
    AudioBus.SFX.button();
    startGameWithCountdown();
    return;
  }

  if (inside(menu)) {
    AudioBus.SFX.button();
    state = "menu";
    return;
  }
}
      });

      function gameLoop(ts) {
        if (!lastTS) lastTS = ts;
        const dt = ts - lastTS;
        lastTS = ts;
        updateUI();
        update(dt, ts);
        draw();

        requestAnimationFrame(gameLoop);
      }
      requestAnimationFrame(gameLoop);
    </script>
  </body>
</html>
