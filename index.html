<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover" />
    <title>Orb Arena</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Nunito:wght@700&display=swap"
      rel="stylesheet"
    />
    <style>
      canvas {
        position: relative; /* ensure it’s not creating a new stacking context */
        z-index: 0;
      }
      html,
      body {
        height: 100%;
        margin: 0;
        background: #1b1b1b;
        -webkit-user-select: none;
        user-select: none;
        touch-action: none;
      }
      canvas {
        display: block;
        margin: auto;
        background: linear-gradient(#222, #111);
        max-width: 500px;
        max-height: 750px;
        width: 100%;
        height: 100vh;
      }
      #muteBtn {
        position: fixed;
        right: 12px;
        bottom: 12px;
        z-index: 10;
        font:
          12px "Press Start 2P",
          monospace;
        color: #fff;
        background: rgba(0, 0, 0, 0.5);
        border: 1px solid #777;
        border-radius: 8px;
        padding: 8px 10px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <button id="muteBtn">🔊</button>
    <canvas id="c"></canvas>
    <script>
      /* =========================================================
         ZOMBIE ARENA — Single file (sprites + WebAudio included)
         (Fixes: softer BGM, boss spawn/alarm, HP tuned, gameover,
         unified wave start, wave countdown SFX, tutorial button placement)
      ========================================================= */

      const canvas = document.getElementById("c"),
        ctx = canvas.getContext("2d");
      const MAX_W = 500,
        MAX_H = 750;
      let playerDrawR = 20;
      function resize() {
        const w = Math.min(innerWidth, MAX_W),
          h = Math.min(innerHeight, MAX_H);
        canvas.style.width = w + "px";
        canvas.style.height = h + "px";
        const dpr = window.devicePixelRatio || 1;
        canvas.width = Math.round(w * dpr);
        canvas.height = Math.round(h * dpr);
        ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
      }
      addEventListener("resize", resize);
      resize();

      /* ============ WebAudio (soft ambient BGM) ============ */
      const AudioBus = (() => {
        let ac,
          gMaster,
          gMusic,
          gSFX,
          muted = false,
          seq = null;
        const now = () => ac.currentTime;
        function ensure() {
          if (ac) return;
          ac = new (window.AudioContext || window.webkitAudioContext)();
          gMaster = ac.createGain();
          gMaster.gain.value = 0.9;
          gMaster.connect(ac.destination);
          gMusic = ac.createGain();
          gMusic.gain.value = 0.5;
          gMusic.connect(gMaster);
          gSFX = ac.createGain();
          gSFX.gain.value = 0.95;
          gSFX.connect(gMaster);
        }
        function unlock() {
          ensure();
          if (ac.state === "suspended") ac.resume();
        }
        function setMuted(m) {
          muted = m;
          ensure();
          const t = now();
          gMaster.gain.cancelScheduledValues(t);
          gMaster.gain.setValueAtTime(gMaster.gain.value, t);
          gMaster.gain.linearRampToValueAtTime(m ? 0 : 0.9, t + 0.06);
        }
        function env(g, t, a = 0.005, d = 0.04, s = 0.6, r = 0.1, peak = 1) {
          g.gain.cancelScheduledValues(t);
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(peak, t + a);
          g.gain.linearRampToValueAtTime(peak * s, t + a + d);
          return { rel: (tr) => g.gain.linearRampToValueAtTime(0, tr + r) };
        }
        function osc(type, freq, dur, gain = 1, det = 0, toBus = gSFX) {
          ensure();
          const o = ac.createOscillator(),
            g = ac.createGain();
          o.type = type;
          o.frequency.value = freq;
          o.detune.value = det;
          g.gain.value = 0;
          o.connect(g);
          g.connect(toBus);
          const t = now(),
            e = env(g, t, 0.002, 0.03, 0.3, Math.min(0.15, dur), gain);
          o.start(t);
          o.stop(t + dur + 0.2);
          e.rel(t + dur);
        }
        function fmPew(freq = 750, dur = 0.12) {
          ensure();
          const c = ac.createOscillator(),
            m = ac.createOscillator(),
            mg = ac.createGain(),
            g = ac.createGain();
          c.type = "square";
          c.frequency.value = freq;
          m.type = "sine";
          m.frequency.value = 240;
          mg.gain.value = 110;
          m.connect(mg);
          mg.connect(c.frequency);
          g.gain.value = 0;
          c.connect(g);
          g.connect(gSFX);
          const t = now();
          c.frequency.exponentialRampToValueAtTime(140, t + dur);
          mg.gain.exponentialRampToValueAtTime(5, t + dur);
          const e = env(g, t, 0.001, 0.03, 0.2, 0.06, 0.9);
          c.start(t);
          m.start(t);
          c.stop(t + dur + 0.1);
          m.stop(t + dur + 0.1);
          e.rel(t + dur);
        }
        function noise(dur = 0.2, lp = 2000, vol = 0.5) {
          ensure();
          const buf = ac.createBuffer(1, ac.sampleRate * dur, ac.sampleRate);
          const d = buf.getChannelData(0);
          for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
          const src = ac.createBufferSource();
          src.buffer = buf;
          const biq = ac.createBiquadFilter();
          biq.type = "lowpass";
          biq.frequency.value = lp;
          const g = ac.createGain();
          g.gain.value = 0;
          src.connect(biq);
          biq.connect(g);
          g.connect(gSFX);
          const t = now(),
            e = env(g, t, 0.002, 0.02, 0.2, 0.1, vol);
          src.start(t);
          src.stop(t + dur + 0.1);
          e.rel(t + dur);
        }
        function chordTone(f, dur = 0.6, type = "triangle", vol = 0.25) {
          ensure();
          const o = ac.createOscillator(),
            g = ac.createGain();
          o.type = type;
          o.frequency.value = f;
          g.gain.value = 0;
          o.connect(g);
          g.connect(gMusic);
          const t = now();
          g.gain.linearRampToValueAtTime(vol, t + 0.02);
          g.gain.linearRampToValueAtTime(0, t + dur);
          o.start(t);
          o.stop(t + dur + 0.05);
        }
        function arpTone(f, dur = 0.22, vol = 0.12) {
          ensure();
          const o = ac.createOscillator(),
            g = ac.createGain();
          o.type = "sine";
          o.frequency.value = f;
          g.gain.value = 0;
          o.connect(g);
          g.connect(gMusic);
          const t = now();
          g.gain.linearRampToValueAtTime(vol, t + 0.03);
          g.gain.linearRampToValueAtTime(0, t + dur);
          o.start(t);
          o.stop(t + dur + 0.05);
        }
        function stopSeq() {
          if (seq) {
            clearInterval(seq);
            seq = null;
          }
        }
        // --- Softer, ambient music loops ---
        function playCalm() {
          stopSeq();
          let i = 0;
          const chords = [
            [262, 330, 392], // C maj
            [247, 311, 392], // B♭
            [233, 294, 370], // A♭
            [247, 311, 392], // B♭
          ];
          seq = setInterval(() => {
            if (muted) return;
            const tri = chords[i % chords.length];
            tri.forEach((f, j) => chordTone(f, 1.0, j === 1 ? "sine" : "triangle", 0.09 + 0.05 * j));
            // gentle sprinkle
            arpTone(tri[0] * 2, 0.18, 0.08);
            i++;
          }, 1000);
        }
        function playGame() {
          stopSeq();
          let step = 0;
          const bass = [55, 65, 73, 65]; // A1-ish groove
          const arps = [440, 494, 523, 587, 659]; // airy arp
          seq = setInterval(() => {
            if (muted) return;
            // soft bass pulse
            chordTone(bass[step % bass.length], 0.28, "triangle", 0.14);
            // light, random arpeggio that doesn't pierce
            const f = arps[(step + Math.floor(Math.random() * 2)) % arps.length];
            arpTone(f, 0.16, 0.07);
            // subtle off-beat
            if (step % 2) arpTone(arps[(step + 1) % arps.length] * 0.5, 0.14, 0.06);
            step++;
          }, 300);
        }
        function fadeMusic(to = 0, time = 0.8) {
          ensure();
          const t = now();
          gMusic.gain.cancelScheduledValues(t);
          gMusic.gain.setValueAtTime(gMusic.gain.value, t);
          gMusic.gain.linearRampToValueAtTime(to, t + time);
        }
        function setMusicLevel(v) {
          ensure();
          gMusic.gain.value = v;
        }

        const SFX = {
          shoot: () => fmPew(760, 0.11),
          pickup: {
            shield: () => {
              osc("sine", 880, 0.08, 0.7);
              osc("sine", 1320, 0.12, 0.5);
            },
            multi: () => {
              osc("triangle", 620, 0.09, 0.6);
              osc("triangle", 740, 0.09, 0.4);
            },
            rapid: () => {
              osc("square", 940, 0.06, 0.7);
              osc("square", 1180, 0.06, 0.5);
            },
            slow: () => {
              osc("sine", 420, 0.18, 0.5);
            },
            heal: () => {
              osc("triangle", 660, 0.1, 0.6);
              osc("triangle", 990, 0.1, 0.5);
            },
            nuke: () => {
              noise(0.35, 700, 0.9);
              osc("sawtooth", 120, 0.25, 0.5);
            },
          },
          expire: () => {
            osc("sine", 520, 0.08, 0.5);
            osc("sine", 390, 0.1, 0.5);
          },
          kill: () => {
            noise(0.08, 1200, 0.5);
            osc("triangle", 180, 0.06, 0.2);
          },
          hit: () => osc("square", 220, 0.05, 0.5),
          shieldHit: () => osc("sawtooth", 400, 0.09, 0.6),
          button: () => osc("triangle", 680, 0.07, 0.5),
          count: (n) => {
            const f = { 3: 620, 2: 540, 1: 480 }[n] || 520;
            osc("square", f, 0.08, 0.6);
          },
          waveStart: () => {
            osc("triangle", 520, 0.12, 0.6);
            osc("triangle", 780, 0.12, 0.5);
          },
          gameStart: () => {
            osc("sawtooth", 660, 0.12, 0.6);
            osc("sawtooth", 990, 0.12, 0.5);
          },
          bossWarn: () => {
            osc("square", 300, 0.14, 0.9);
            osc("square", 450, 0.14, 0.7);
          },
          bossLaser: () => osc("sawtooth", 720, 0.2, 0.6),
          bossTeleport: () => {
            osc("triangle", 520, 0.12, 0.6);
          },
          bossHeal: () => {
            osc("sine", 700, 0.18, 0.6);
          },
          bossSpike: () => {
            noise(0.18, 600, 0.6);
          },
          bossSlam: () => {
            noise(0.2, 400, 0.6);
          },
          bossDash: () => {
            osc("sawtooth", 420, 0.1, 0.7);
          },
        };
        return { unlock, setMuted, fadeMusic, setMusicLevel, playCalm, playGame, SFX };
      })();

      /* ===== Audio unlock + calm on first interaction (keeps menu BGM working) ===== */
      let _calmPrimed = false;
      const primeCalm = () => {
        if (_calmPrimed) return;
        AudioBus.unlock();
        AudioBus.playCalm();
        AudioBus.setMusicLevel(0.45);
        _calmPrimed = true;
      };
      addEventListener("pointerdown", primeCalm, { once: true });
      addEventListener("keydown", primeCalm, { once: true });

      /* ============ Sprite sheet (drawn in-page) ============ */
      const SPR_SIZE = 32,
        SPR_COLS = 6,
        SPR_ROWS = 2;
      const spriteSheet = new Image();
      (function makeSheet() {
        const W = SPR_SIZE * SPR_COLS,
          H = SPR_SIZE * SPR_ROWS;
        const c = document.createElement("canvas");
        c.width = W;
        c.height = H;
        const d = c.getContext("2d");
        const orb = (x, y, r, fill, stroke, sw = 1) => {
          d.fillStyle = fill;
          d.beginPath();
          d.arc(x, y, r, 0, Math.PI * 2);
          d.fill();
          if (stroke) {
            d.lineWidth = sw;
            d.strokeStyle = stroke;
            d.stroke();
          }
        };
        const px = (x, y, col) => {
          d.fillStyle = col;
          d.fillRect(x, y, 1, 1);
        };
        const line = (x1, y1, x2, y2, col, w = 1) => {
          d.strokeStyle = col;
          d.lineWidth = w;
          d.beginPath();
          d.moveTo(x1, y1);
          d.lineTo(x2, y2);
          d.stroke();
        };
        const cracks = (x, y, col) => {
          line(x - 8, y - 3, x + 8, y - 3, col);
          line(x - 8, y, x + 8, y, col);
          line(x - 8, y + 3, x + 8, y + 3, col);
          line(x, y - 8, x, y + 8, col);
        };
        const streaks = (x, y, col) => {
          [y - 4, y, y + 4].forEach((Y) => line(x + 10, Y, x + 16, Y, col));
        };
        const hex = (cx, cy, r, col) => {
          d.strokeStyle = col;
          d.beginPath();
          for (let i = 0; i < 6; i++) {
            const a = (i * Math.PI) / 3,
              x = cx + Math.cos(a) * r * 0.9,
              y = cy + Math.sin(a) * r * 0.9;
            if (!i) d.moveTo(x, y);
            else d.lineTo(x, y);
          }
          d.closePath();
          d.stroke();
        };
        const concentric = (cx, cy, col) =>
          [2, 4, 6, 8].forEach((r) => {
            d.strokeStyle = col;
            d.beginPath();
            d.arc(cx, cy, r, 0, Math.PI * 2);
            d.stroke();
          });
        const star = (cx, cy, col) =>
          [
            [0, -6],
            [6, 0],
            [0, 6],
            [-6, 0],
            [5, -5],
            [-5, -5],
            [5, 5],
            [-5, 5],
          ].forEach(([dx, dy]) => line(cx, cy, cx + dx, cy + dy, col));
        const snow = (cx, cy, col) =>
          [
            [0, -7],
            [7, 0],
            [0, 7],
            [-7, 0],
            [5, -5],
            [-5, -5],
            [5, 5],
            [-5, 5],
          ].forEach(([dx, dy]) => line(cx, cy, cx + dx, cy + dy, col));
        const rad = (cx, cy) => {
          d.fillStyle = "#000";
          const pie = (a1, a2) => {
            d.beginPath();
            d.moveTo(cx, cy);
            d.arc(cx, cy, 8, a1, a2);
            d.closePath();
            d.fill();
          };
          pie(5.236, 5.934);
          pie(1.047, 1.745);
          pie(3.142, 3.839);
          orb(cx, cy, 2, "#ffa500");
        };
        const GREEN = "#50ff78",
          LIME = "#a0ffa0",
          RED = "#f03c3c",
          MAG = "#f050f0",
          ORG = "#ff8c3c",
          CY = "#5adcff",
          LBL = "#8cc8ff",
          YL = "#ffdc46",
          Wc = "#fff";
        const cell = (i, j) => ({ x: i * SPR_SIZE + SPR_SIZE / 2, y: j * SPR_SIZE + SPR_SIZE / 2 });
        // row 0
        let C = cell(0, 0);
        orb(C.x, C.y, 10, GREEN, "#007800");
        [
          [-9, 0],
          [9, 0],
          [0, -9],
          [0, 9],
          [-7, -7],
          [7, -7],
          [-7, 7],
          [7, 7],
        ].forEach(([dx, dy]) => px(C.x + dx, C.y + dy, LIME));
        C = cell(1, 0);
        orb(C.x, C.y, 10, RED, "#780000");
        cracks(C.x, C.y, "#780000");
        C = cell(2, 0);
        orb(C.x, C.y, 8, MAG, "#780078");
        streaks(C.x, C.y, "#c864c8");
        C = cell(3, 0);
        orb(C.x, C.y, 12, ORG, "#783c00", 2);
        cracks(C.x, C.y, "#783c00");
        // row 1
        C = cell(0, 1);
        orb(C.x, C.y, 10, CY, "#006e8c");
        hex(C.x, C.y, 10, "#bfffff");
        C = cell(1, 1);
        orb(C.x, C.y, 10, YL, "#786400");
        star(C.x, C.y, Wc);
        C = cell(2, 1);
        orb(C.x, C.y, 10, "#ffaa3c", "#783c00");
        concentric(C.x, C.y, Wc);
        C = cell(3, 1);
        orb(C.x, C.y, 10, LBL, "#285078");
        snow(C.x, C.y, Wc);
        C = cell(4, 1);
        orb(C.x, C.y, 10, "#78e678", "#005000");
        C = cell(5, 1);
        orb(C.x, C.y, 10, "#ff6450", "#8c2814");
        rad(C.x, C.y);
        spriteSheet.src = c.toDataURL("image/png");
      })();
      const SPR = {
        player: { x: 0, y: 0 },
        z_norm: { x: 32, y: 0 },
        z_fast: { x: 64, y: 0 },
        z_tank: { x: 96, y: 0 },
        shield: { x: 0, y: 32 },
        multi: { x: 32, y: 32 },
        rapid: { x: 64, y: 32 },
        slow: { x: 96, y: 32 },
        heal: { x: 128, y: 32 },
        nuke: { x: 160, y: 32 },
      };
      function drawSprite(key, x, y, size) {
        const s = SPR[key];
        if (!s) return;
        const d = size || 32;
        ctx.drawImage(spriteSheet, s.x, s.y, 32, 32, x - d / 2, y - d / 2, d, d);
      }

      /* ================= Game State & Entities ================= */
      let state = "menu"; // menu, tutorial, starting, playing, pausedBetween, dying, gameover, win
      let score = 0,
        wave = 1,
        elapsed = 0;
      let zombies = [],
        bullets = [],
        powerups = [],
        particles = [],
        hazards = [],
        telegraphs = [],
        bosses = [];
      let lastTS = 0,
        shake = 0;

      const player = {
        x: 0,
        y: 0,
        r: 16,
        vx: 0,
        vy: 0,
        maxHealth: 100,
        health: 100,
        maxShield: 100,
        shieldHP: 0,
        multi: false,
      };

      const joystick = {
        cx: 80,
        cy: canvas.clientHeight - 100,
        baseR: 48,
        stickR: 22,
        stickX: 0,
        stickY: 0,
        active: false,
        pointerId: null, // <-- add
      };
      const shootBtn = {
        cx: canvas.clientWidth - 80,
        cy: canvas.clientHeight - 100,
        r: 48,
        pressed: false,
        pointerId: null, // <-- add
      };
      const pauseBtn = { x: 0, y: 0, r: 24 };
      function updateUI() {
        joystick.cy = canvas.clientHeight - 100;
        shootBtn.cx = canvas.clientWidth - 80;
        shootBtn.cy = canvas.clientHeight - 100;
        pauseBtn.x = canvas.clientWidth - 12 - pauseBtn.r;
        pauseBtn.y = 12 + pauseBtn.r;
      }
      addEventListener("resize", updateUI);

      let pauseUI = { open: false, confirm: false },
        resumeTimer = 0,
        resumeCount = 0;
      let startCountdown = { n: 3, t: 0, active: false };
      let wavePlan = { remain: 0, spawnEvery: 0.5, acc: 0 };

      // Track integer countdown ticks for wavePause SFX
      let wavePause = 0,
        wavePausePrevInt = null;

      function planWave() {
        const total = 3 + wave * 3;
        wavePlan = { remain: total, spawnEvery: Math.max(0.28, 0.56 - 0.02 * wave), acc: 0 };
      }
      function spawnAroundPlayer(minR = 580, maxR = 860) {
        const a = Math.random() * Math.PI * 2,
          d = minR + Math.random() * (maxR - minR);
        return { x: player.x + Math.cos(a) * d, y: player.y + Math.sin(a) * d };
      }

      /* ================= Global Slow effect ================= */
      let slowFactor = 0.6,
        slowTarget = 1.0,
        slowTransition = 0;
      function applySlow(start) {
        if (start) {
          slowTarget = slowFactor;
          slowTransition = 0.5;
        } else {
          slowTarget = 1.0;
          slowTransition = 0.5;
        }
      }

      /* ================= Zombies ================= */
      function makeZombie(type) {
        const p = spawnAroundPlayer();
        const initialScale = slowTarget < 1 ? slowTarget : 1;
        if (type === "fast")
          return {
            ...p,
            type,
            r: 16,
            speed: 1.3 + wave * 0.08,
            hp: 1,
            maxHp: 1,
            dmg: 6,
            trail: [],
            speedScale: initialScale,
          };
        if (type === "tank") {
          const hp = 4 + Math.floor(wave * 0.5);
          return {
            ...p,
            type,
            r: 28,
            speed: 0.6 + wave * 0.04,
            hp,
            maxHp: hp,
            dmg: 24,
            trail: [],
            speedScale: initialScale,
          };
        }
        const nhp = 2 + Math.floor(wave * 0.25);
        return {
          ...p,
          type: "normal",
          r: 20,
          speed: 0.9 + wave * 0.05,
          hp: nhp,
          maxHp: nhp,
          dmg: 12,
          trail: [],
          speedScale: initialScale,
        };
      }
      function spawnOneZombie() {
        const r = Math.random();
        if (r < 0.2) zombies.push(makeZombie("fast"));
        else if (r < 0.4) zombies.push(makeZombie("tank"));
        else zombies.push(makeZombie("normal"));
      }

      /* ================= Bosses (multi) ================= */
      function cycleIndexForWave(w) {
        return Math.floor((w - 1) / 10);
      } // 1–10=>0, 11–20=>1, etc.
      function bossSpecForWave(w) {
        const mod = w % 10,
          cyc = cycleIndexForWave(w);
        if (mod === 5) return { mini: 1 + cyc, main: 0, label: "MINI BOSS INCOMING" };
        if (mod === 0) return { mini: 0, main: 1 + cyc, label: "BOSS INCOMING" };
        return { mini: 0, main: 0, label: "" };
      }
      function isBossWave() {
        const s = bossSpecForWave(wave);
        return s.mini + s.main > 0;
      }

      let bossAlert = { text: "", t: 0 };
      function spawnBosses() {
        const spec = bossSpecForWave(wave),
          cyc = cycleIndexForWave(wave);
        const spawnOne = (type, idx, total) => {
          const angle = Math.PI * 2 * (idx / Math.max(1, total));
          const dist = 620 + (type === "main" ? 80 : 0);
          const pos = { x: player.x + Math.cos(angle) * dist, y: player.y + Math.sin(angle) * dist };
          // Reduced base HP, still scales by cycle
          const hpBase = type === "main" ? 250 : 120;
          const hpScale = 1 + 0.25 * cyc;
          const speedBase = type === "main" ? 0.65 : 0.9;
          const b = {
            type,
            x: pos.x,
            y: pos.y,
            r: type === "main" ? 56 : 42,
            baseSpeed: speedBase,
            speedScale: slowTarget < 1 ? slowTarget : 1,
            hp: Math.round(hpBase * hpScale),
            maxHp: Math.round(hpBase * hpScale),
            atkTimer: 0,
            ringTimer: 0,
            spawnTimer: 0,
            specTimer: 0,
            specCd: 2.0,
          };
          if (cyc > 0) b.baseSpeed *= 1 + 0.05 * cyc; // slight speed ramp per cycle
          bosses.push(b);
        };
        let idx = 0,
          total = spec.mini + spec.main;
        for (let i = 0; i < spec.mini; i++) spawnOne("mini", idx++, total);
        for (let i = 0; i < spec.main; i++) spawnOne("main", idx++, total);

        bossAlert = { text: spec.label, t: 2.2 };
        AudioBus.SFX.bossWarn();
        AudioBus.fadeMusic(0, 0.6);
        setTimeout(() => {
          AudioBus.playGame();
          AudioBus.setMusicLevel(0.5);
        }, 650);
      }

      /* ---- Telegraph helpers ---- */
      function addTelegraph(obj) {
        telegraphs.push(obj);
      }
      function drawTelegraphs() {
        const W = canvas.clientWidth,
          H = canvas.clientHeight;
        telegraphs.forEach((t) => {
          const alpha = 0.4 + 0.3 * Math.sin((t.time / t.max) * Math.PI * 2);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.strokeStyle = t.color || "red";
          ctx.fillStyle = t.fill || "rgba(255,0,0,0.2)";
          ctx.lineWidth = t.lw || 3;
          if (t.type === "circle") {
            const sx = W / 2 + (t.x - player.x),
              sy = H / 2 + (t.y - player.y);
            ctx.beginPath();
            ctx.arc(sx, sy, t.r, 0, Math.PI * 2);
            ctx.stroke();
          } else if (t.type === "line") {
            const sx = W / 2 + (t.x1 - player.x),
              sy = H / 2 + (t.y1 - player.y),
              ex = W / 2 + (t.x2 - player.x),
              ey = H / 2 + (t.y2 - player.y);
            ctx.beginPath();
            ctx.moveTo(sx, sy);
            ctx.lineTo(ex, ey);
            ctx.stroke();
          } else if (t.type === "arc") {
            const sx = W / 2 + (t.x - player.x),
              sy = H / 2 + (t.y - player.y);
            ctx.beginPath();
            ctx.arc(sx, sy, t.r, t.a1, t.a2);
            ctx.stroke();
          }
          ctx.restore();
        });
      }

      /* ---- Boss special attacks (telegraphed) ---- */
      function scheduleMiniBossSpecial(b, dt) {
        b.specTimer += dt / 1000;
        if (b.specTimer < b.specCd) return;
        b.specTimer = 0;
        b.specCd = 3 + Math.random() * 2;
        const roll = Math.random();
        if (roll < 0.5) {
          const a = Math.atan2(player.y - b.y, player.x - b.x);
          const len = 480;
          const tx = b.x + Math.cos(a) * len,
            ty = b.y + Math.sin(a) * len;
          addTelegraph({ type: "line", x1: b.x, y1: b.y, x2: tx, y2: ty, time: 0, max: 0.6, lw: 5 });
          AudioBus.SFX.bossDash();
          b.pending = { kind: "dash", a, speed: 5.5, t: 0.6 };
        } else {
          const spots = [];
          for (let i = 0; i < 6; i++) {
            const ang = Math.random() * Math.PI * 2,
              r = 100 + Math.random() * 160;
            spots.push({ x: player.x + Math.cos(ang) * r, y: player.y + Math.sin(ang) * r });
          }
          spots.forEach((s) => addTelegraph({ type: "circle", x: s.x, y: s.y, r: 26, time: 0, max: 0.6 }));
          AudioBus.SFX.bossSpike();
          b.pending = { kind: "spikes", spots, t: 0.6 };
        }
      }
      function scheduleMainBossSpecial(b, dt) {
        b.specTimer += dt / 1000;
        if (b.specTimer < b.specCd) return;
        b.specTimer = 0;
        b.specCd = 3 + Math.random() * 2.5;
        const roll = Math.random();
        if (roll < 0.3) {
          const base = Math.atan2(player.y - b.y, player.x - b.x);
          addTelegraph({
            type: "arc",
            x: b.x,
            y: b.y,
            r: 280,
            a1: base - 0.8,
            a2: base + 0.8,
            time: 0,
            max: 0.8,
            lw: 6,
          });
          AudioBus.SFX.bossLaser();
          b.pending = { kind: "laser", base, width: 0.06, start: base - 0.8, end: base + 0.8, dur: 1.8, t: 0.8 };
        } else if (roll < 0.55) {
          const ang = Math.random() * Math.PI * 2,
            d = 220 + Math.random() * 180,
            tx = player.x + Math.cos(ang) * d,
            ty = player.y + Math.sin(ang) * d;
          addTelegraph({ type: "circle", x: tx, y: ty, r: b.r + 12, time: 0, max: 0.7 });
          AudioBus.SFX.bossTeleport();
          b.pending = { kind: "teleportSlam", tx, ty, t: 0.7 };
        } else if (roll < 0.7) {
          addTelegraph({ type: "circle", x: b.x, y: b.y, r: 140, time: 0, max: 0.6 });
          AudioBus.SFX.bossHeal();
          b.pending = { kind: "heal", amount: Math.floor(b.maxHp * 0.08), t: 0.6 };
        } else if (roll < 0.85) {
          addTelegraph({ type: "circle", x: b.x, y: b.y, r: 20, time: 0, max: 0.6 });
          b.pending = { kind: "rings", waves: 3, t: 0.6 };
        } else {
          addTelegraph({ type: "circle", x: b.x, y: b.y, r: b.r + 20, time: 0, max: 0.5 });
          b.pending = { kind: "surge", t: 0.5 };
        }
      }

      /* ================= Particles ================= */
      function burst(x, y, color, count = 12) {
        for (let i = 0; i < count; i++) {
          const a = Math.random() * Math.PI * 2,
            sp = 0.5 + Math.random() * 3;
          particles.push({
            x,
            y,
            vx: Math.cos(a) * sp,

      /* ================= Shooting ================= */
      let baseFireDelay = 200,
        fireDelay = 200,
        lastShot = 0;
      function tryAutoShoot(ts) {
        if (state !== "playing") return;
        if (!shootBtn.pressed && !keys.Space && !mouseDown) return;
        let target = null,
          dist = Infinity;
        bosses.forEach((b) => {
          const d = Math.hypot(b.x - player.x, b.y - player.y);
          if (d < dist) {
            dist = d;
            target = b;
          }
        });
        if (!target) {
          zombies.forEach((z) => {
            const d = Math.hypot(z.x - player.x, z.y - player.y);
            if (d < dist) {
              dist = d;
              target = z;
            }
          });
        }
        if (!target) return;
        if (ts - lastShot < fireDelay) return;
        lastShot = ts;
        shootAt(target.x, target.y, player.multi);
        AudioBus.SFX.shoot();
        // (No haptic here to avoid spamming)
      }
      function shootAt(tx, ty, spread = false) {
        const bx = player.x,
          by = player.y,
          a = Math.atan2(ty - by, tx - bx),
          sp = 14;
        if (spread) {
          const s = 0.35;
          for (let i = -2; i <= 2; i++) {
            const aa = a + i * (s / 2);
            bullets.push({ x: bx, y: by, vx: Math.cos(aa) * sp, vy: Math.sin(aa) * sp, r: 5 });
          }
        } else bullets.push({ x: bx, y: by, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp, r: 5 });
      }

      /* ================= Powerups ================= */
      const PU_TYPES = ["shield", "multi", "rapid", "slow", "heal", "nuke"];
      function weightedType() {
        const w = [20, 22, 22, 16, 12, 8];
        const r = Math.random() * 100;
        let a = 0;
        for (let i = 0; i < PU_TYPES.length; i++) {
          a += w[i];
          if (r < a) return PU_TYPES[i];
        }
        return "shield";
      }
      function tryDrop(x, y) {
        if (Math.random() < 0.15) powerups.push({ x, y, r: 15, type: weightedType(), age: 0, blink: false });

      function labelFor(t) {

      /* ================= Effects ================= */
      let effects = [];
      const EFFECT_COLORS = { rapid: "#ffa64d", multi: "#ffd84d", slow: "#79c2ff" };
      function upsertEffect(type, dur) {
        const e = effects.find((x) => x.type === type);
        if (e) {
          e.dur = dur;
          e.remain = dur;
        } else effects.push({ type, dur, remain: dur, color: EFFECT_COLORS[type] || "#fff" });
      }
      function endEffect(type) {
        const i = effects.findIndex((x) => x.type === type);
        if (i >= 0) effects.splice(i, 1);
        if (type === "rapid") fireDelay = baseFireDelay;
        if (type === "multi") player.multi = false;
        if (type === "slow") {
          slowTarget = 1.0;
